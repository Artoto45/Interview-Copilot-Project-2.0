name: Regression Battery

on:
  push:
  pull_request:
  schedule:
    # Nightly run at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      run_robust:
        description: "Run robust battery in addition to core"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: regression-battery-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run core regression battery
        run: python tests/run_robust_battery.py --mode core

  robust:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_robust)
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      PYTHONUNBUFFERED: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libportaudio2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run robust regression battery
        run: python tests/run_robust_battery.py --mode robust
